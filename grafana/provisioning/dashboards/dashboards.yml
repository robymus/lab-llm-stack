# =============================================================================
#  Grafana provisioned dashboards
# -----------------------------------------------------------------------------
#  Tells Grafana to load every *.json file under the bind-mounted dashboards
#  directory at startup and reload on change.
# =============================================================================

apiVersion: 1

providers:
  - name: llm-stack
    orgId: 1
    folder: "LLM Stack"      # the folder name users see in the UI
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30   # pick up changes without restarting Grafana
    allowUiUpdates: true        # let users tinker in the UI; "Save JSON" via Grafana export to persist
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false

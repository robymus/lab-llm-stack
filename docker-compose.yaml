# =============================================================================
#  LLM SRE Sandbox — Phase 1.0 compose file
# -----------------------------------------------------------------------------
#  Reading order:
#    1. Top-level keys (name, networks, volumes) — the substrate everything
#       else hangs off.
#    2. Services, in dependency order: vllm-engine → litellm → langfuse-db →
#       langfuse. Each block opens with a one-line summary, then settings, and
#       every non-obvious flag has an inline comment explaining *why* it's set.
#
#  Conventions:
#    - All services join one user-defined bridge network (`llm-stack`) so
#      service names act as DNS — no `localhost`, no published-port plumbing
#      between containers.
#    - Healthchecks are explicit on every long-lived service; `depends_on`
#      uses `condition: service_healthy` so dependent services don't race
#      against startup.
#    - Image tags are pinned to specific versions. Phase 1.4 re-verifies them;
#      if you bump one, regenerate the smoke tests in the relevant README.
#    - Secrets come from `.env` (loaded automatically by compose). Do not
#      inline secrets here.
#
#  The compose `version:` key is deliberately omitted — it's a no-op since
#  Compose v2 and the spec recommends dropping it.
# =============================================================================

name: llm-stack   # explicit project name; otherwise compose derives it from
                  # the directory name, which changes if anyone clones into a
                  # differently-named folder.

# ---------------------------------------------------------------------------
#  Shared env blocks (YAML anchors, Phase 2.1)
# ---------------------------------------------------------------------------
#  Langfuse v3 splits ingest across a `langfuse` web container and a
#  `langfuse-worker` container. Both consume the same env block — DB +
#  ClickHouse + Redis + Minio (S3) + NextAuth + crypto. We define it once
#  here and merge it into both services with `<<: *langfuse-env` so the
#  pair can't drift. `x-` keys are ignored by Compose at the top level.
x-langfuse-env: &langfuse-env
  # PostgreSQL — primary metadata store (carries over from v2).
  DATABASE_URL: postgresql://langfuse:${LANGFUSE_DB_PASSWORD}@langfuse-db:5432/langfuse
  # ClickHouse — events + observations (new in v3). Two URLs: the HTTP one
  # for runtime queries, the native one for schema migrations on startup.
  CLICKHOUSE_URL: http://langfuse-clickhouse:8123
  CLICKHOUSE_MIGRATION_URL: clickhouse://langfuse-clickhouse:9000
  CLICKHOUSE_USER: langfuse
  CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
  # We run a single-node ClickHouse (no Zookeeper). By default the migrator
  # creates `ON CLUSTER default ... ReplicatedMergeTree` tables, which fail
  # with "There is no Zookeeper configuration". Setting this to `false`
  # makes the migrator use plain MergeTree — correct for single-node.
  CLICKHOUSE_CLUSTER_ENABLED: "false"
  # Redis — ingest queue between web (enqueue) and worker (dequeue).
  REDIS_HOST: langfuse-redis
  REDIS_PORT: "6379"
  REDIS_AUTH: ${REDIS_PASSWORD}
  # Minio (S3-compatible) — Langfuse batches incoming events into objects
  # and stages them through S3 before ClickHouse insertion. `auto` is NOT
  # an accepted region; use a real one (the AWS SDK still validates the
  # string even when the endpoint is Minio).
  LANGFUSE_S3_EVENT_UPLOAD_BUCKET: langfuse
  LANGFUSE_S3_EVENT_UPLOAD_REGION: us-east-1
  LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
  LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
  LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT: http://langfuse-minio:9000
  LANGFUSE_S3_EVENT_UPLOAD_FORCE_PATH_STYLE: "true"
  LANGFUSE_S3_EVENT_UPLOAD_PREFIX: events/
  # NextAuth (session signing) + at-rest encryption.
  NEXTAUTH_URL: http://localhost:3001
  NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
  SALT: ${LANGFUSE_SALT}
  # New in v3: a separate 64-hex-char key for column-level encryption of
  # sensitive fields (API keys, integrations). Once data is written you
  # MUST keep this stable — rotating it makes existing rows unreadable.
  ENCRYPTION_KEY: ${LANGFUSE_ENCRYPTION_KEY}
  TELEMETRY_ENABLED: "false"

# ---------------------------------------------------------------------------
#  Networks
# ---------------------------------------------------------------------------
#  Single bridge network. Container DNS resolves service names to internal
#  IPs (e.g. the app reaches the gateway as http://litellm:4000), which is
#  what makes Phase 2's backend-swap trivial — only the gateway config moves.
networks:
  llm-stack:
    driver: bridge

# ---------------------------------------------------------------------------
#  Named volumes
# ---------------------------------------------------------------------------
#  Anything that holds state we want to survive `docker compose down` lives
#  here. We deliberately avoid bind-mounting into the repo for state dirs —
#  it creates permission headaches and pollutes git status.
volumes:
  hf-cache:                  # HuggingFace model cache shared across vLLM restarts;
                             # downloading Qwen2.5-3B-AWQ takes ~2 GB / a few minutes.
  langfuse-pg-data:          # Langfuse's Postgres data dir (metadata).
  langfuse-clickhouse-data:  # Phase 2.1: ClickHouse event store for Langfuse v3.
  langfuse-redis-data:       # Phase 2.1: Redis AOF/RDB (queue is transient,
                             # but enabling persistence avoids losing in-flight
                             # events across a `docker compose restart`).
  langfuse-minio-data:       # Phase 2.1: Minio (S3) blob store for batched
                             # event uploads on the way to ClickHouse.
  prometheus-data:           # Prometheus TSDB (added in Phase 1.1; declared
                             # now so the file stays stable as we expand).
  grafana-data:              # Grafana sqlite + plugin cache (Phase 1.1).
  loki-data:                 # Phase 2.3: Loki chunks + TSDB index + compactor
                             # state. ~50 MB/day under sandbox load.

# ---------------------------------------------------------------------------
#  Services
# ---------------------------------------------------------------------------
services:

  # =========================================================================
  #  vLLM inference engine
  # -------------------------------------------------------------------------
  #  Serves the model over an OpenAI-compatible API on :8000 and exposes
  #  Prometheus metrics on the same port at /metrics (no separate exporter
  #  needed). This is the only service that requires the NVIDIA Container
  #  Toolkit on the host.
  # =========================================================================
  vllm-engine:
    # v0.6.6 is the first release where the AWQ-Marlin kernel for Ada
    # (compute capability 8.9) is stable. Bumping requires re-checking that
    # `--quantization awq_marlin` still works on the 4060 — change carefully.
    image: vllm/vllm-openai:v0.6.6
    container_name: vllm-engine
    restart: unless-stopped

    # Each flag below maps to a learning point — see vllm/README.md for the
    # long-form explanation. Order matches the README for easy cross-reference.
    command:
      - --model
      - Qwen/Qwen2.5-3B-Instruct-AWQ          # ~2.2 GB AWQ-INT4 weights; fits 8 GB with KV-cache headroom
      - --quantization
      - awq_marlin                            # fast AWQ kernel for Ada; falls back to `awq` if Marlin breaks
      - --max-model-len
      - "4096"                                # caps KV cache; raise only if you've measured headroom
      - --gpu-memory-utilization
      - "0.85"                                # leave ~15% slack for the runtime allocator's quirks
      - --enable-prefix-caching               # makes prefix-cache-hit metrics non-zero — observable lesson
      - --served-model-name
      - qwen-chat                             # stable alias the gateway routes to; weight name can change
      # Tool-calling support — required for the agent app's tool_choice="auto".
      # Without these vLLM 400s with: "auto tool choice requires --enable-auto-tool-choice".
      # `hermes` is the parser that matches Qwen2.5's chat template; other models
      # use different parsers (e.g. `llama3_json` for Llama 3.x).
      - --enable-auto-tool-choice
      - --tool-call-parser
      - hermes
      - --host
      - 0.0.0.0
      - --port
      - "8000"

    # Real env (not config flags) — only the HF token, which gates model
    # download. Public models like Qwen2.5 don't need it; gated models do.
    environment:
      HF_TOKEN: ${HF_TOKEN}
      HUGGING_FACE_HUB_TOKEN: ${HF_TOKEN}    # different libraries read different names; set both
      # vLLM emits Prometheus metrics by default; explicit for clarity.
      VLLM_LOGGING_LEVEL: INFO

    ports:
      - "8000:8000"                          # exposed on the host so `curl :8000/metrics` works from your shell

    volumes:
      # Persist downloaded weights so a `down` + `up` doesn't re-download
      # the model. Mounted at root-cache because the image runs as root.
      - hf-cache:/root/.cache/huggingface

    networks:
      - llm-stack

    # GPU access. Requires `nvidia-container-toolkit` on the host AND the
    # nvidia runtime registered with Docker (`docker info | grep nvidia`).
    # Without these two, this block silently does nothing and the container
    # starts CPU-only — which then fails as soon as vLLM tries to allocate
    # CUDA memory. See scripts/preflight.sh.
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

    # Loading the model takes ~30-90s on first run. The `start_period` keeps
    # the container marked as "starting" (not "unhealthy") during that
    # window, so dependent services wait properly instead of failing fast.
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 120s

    # Shared-memory size: vLLM's worker processes communicate via shm and
    # the default 64M is too small for any non-toy model.
    shm_size: "2gb"

  # =========================================================================
  #  Triton Inference Server (Phase 2.0 — second backend, opt-in)
  # -------------------------------------------------------------------------
  #  Serves a TensorRT-LLM-compiled Qwen2.5-3B engine via Triton's standard
  #  /v2 inference API. LiteLLM routes the logical model name `qwen-chat-trt`
  #  here (see litellm/config.yaml); to actually use it, switch the agent's
  #  model name OR enable the `model_group_alias` block at the bottom of the
  #  LiteLLM config.
  #
  #  Why it's gated behind `profiles: [triton]`:
  #    - 8 GB GPU constraint — vLLM and Triton can't both fit at full batch.
  #      The default profile is "vLLM only"; opt into `triton` (and stop
  #      vllm-engine first) when you want to demo the swap.
  #    - The compiled engine binary is GPU-specific (SM 8.9 only) and must
  #      be built via `scripts/build-trt-engine.sh` before this service can
  #      start healthy. Bundling the engine into git would be a ~3 GB blob
  #      that doesn't run on anyone else's GPU.
  #
  #  Swap workflow (when the engine has been built):
  #      docker compose stop vllm-engine
  #      docker compose --profile triton up -d triton-server
  #  And the other way back:
  #      docker compose stop triton-server
  #      docker compose up -d vllm-engine
  # =========================================================================
  triton-server:
    image: nvcr.io/nvidia/tritonserver:25.04-trtllm-python-py3
    container_name: triton-server
    restart: unless-stopped
    profiles: [triton]                        # opt-in only — `docker compose up` (no --profile) skips this

    command:
      - tritonserver
      - --model-repository=/models
      - --log-verbose=1
      - --http-port=8002                      # avoid colliding with vLLM:8000 (so both CAN run side by side
                                              # if you ever swap to a bigger GPU)
      - --grpc-port=8003
      - --metrics-port=8004                   # Prometheus scrape target — see prometheus/prometheus.yml

    volumes:
      # The model repository populated by scripts/build-trt-engine.sh —
      # holds the .engine binary, tokenizer files, and the inflight_batcher_llm
      # ensemble (preprocess + tensorrt_llm + postprocess + bls).
      - ./triton/model_repository:/models:ro

    ports:
      - "8002:8002"                           # HTTP /v2 inference
      - "8004:8004"                           # Prometheus /metrics

    networks:
      - llm-stack

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

    shm_size: "1gb"                           # tritonserver workers need shm — 1g is enough for batch_size 8

    # Pin all in-container threads to a small CPU set so the Python stub
    # processes (preprocessing / postprocessing / BLS) don't get migrated
    # between cores mid-startup. Without this, PyTorch's userspace
    # __rdtsc() reads in `c10::ApproximateClock` can come back
    # non-monotonic across migrations and the python stub crashes with
    # `fast_1 >= fast_0 INTERNAL ASSERT FAILED ... getCount is non-monotonic`.
    # Hosts where /sys/.../current_clocksource is anything other than
    # `tsc` are vulnerable; preflight.sh warns about that. 4 cores is
    # plenty for our batch_size=8 — Triton's heavy lifting is on the GPU.
    cpuset: "0-3"

    healthcheck:
      # /v2/health/ready returns 200 once all models in the repo are
      # loaded. With the inflight_batcher_llm ensemble (5 sub-models),
      # cold-start takes 30-90 s — generous start_period.
      test: ["CMD", "curl", "-fsS", "http://localhost:8002/v2/health/ready"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 120s

  # =========================================================================
  #  LiteLLM gateway
  # -------------------------------------------------------------------------
  #  The orchestration seam. One YAML file decides which backend handles
  #  which logical model name — swapping vLLM for Triton in Phase 2 is a
  #  one-line change here.
  # =========================================================================
  litellm:
    # LiteLLM doesn't publish clean semver tags for the `main-stable` channel,
    # so we pin by manifest digest — fully reproducible, immune to the
    # tag being moved upstream. See VERSIONS.md for the human-readable
    # version (`main-stable` as of 2026-04-26) and the bump procedure.
    image: ghcr.io/berriai/litellm@sha256:6c82d338a60e7b273ae46bf1d8db814d2856ae010f96c44eeadde574d3893f76
    container_name: litellm
    restart: unless-stopped

    # The CLI flag points at the config file we mount below. `--detailed_debug`
    # is helpful while learning; turn it off once dashboards work.
    command:
      - --config
      - /app/config.yaml
      - --port
      - "4000"
      - --host
      - 0.0.0.0
      - --num_workers
      - "1"                                  # single worker keeps logs readable; raise for load tests

    environment:
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY}
      LITELLM_LOG: INFO

    ports:
      - "4000:4000"                          # gateway API + /metrics on the same port

    volumes:
      # Bind-mount the config so edits take effect after `docker compose restart litellm`
      # without a rebuild. Read-only so the container can't write back.
      - ./litellm/config.yaml:/app/config.yaml:ro

    networks:
      - llm-stack

    depends_on:
      vllm-engine:
        condition: service_healthy           # don't start until vLLM can answer requests

    # LiteLLM's slim image has neither `wget` nor `curl`, but it always has
    # Python (it's a Python app). urllib is in the stdlib, so no extras to
    # install. We hit `/health/liveliness` because it's the lightest of the
    # several health endpoints — just confirms the process is alive,
    # without probing backends (which would couple this healthcheck to
    # vllm-engine's state).
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:4000/health/liveliness',timeout=3).status==200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # =========================================================================
  #  Langfuse Postgres
  # -------------------------------------------------------------------------
  #  Storage backend for Langfuse v2. Internal-only — no host port. We pin
  #  to Postgres 16 because Langfuse v2's migrations are tested against
  #  14-16; PG 17 may or may not work, no need to find out the hard way.
  # =========================================================================
  langfuse-db:
    image: postgres:16-alpine
    container_name: langfuse-db
    restart: unless-stopped

    environment:
      POSTGRES_USER: langfuse
      POSTGRES_PASSWORD: ${LANGFUSE_DB_PASSWORD}
      POSTGRES_DB: langfuse

    volumes:
      - langfuse-pg-data:/var/lib/postgresql/data

    networks:
      - llm-stack

    # No published port — Langfuse reaches it via service-name DNS only.
    # If you need to poke at it: `docker compose exec langfuse-db psql -U langfuse`.

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U langfuse -d langfuse"]
      interval: 5s
      timeout: 3s
      retries: 10

  # =========================================================================
  #  Langfuse ClickHouse (Phase 2.1) — events + observations store
  # -------------------------------------------------------------------------
  #  v3 moves the high-cardinality trace data out of Postgres and into
  #  ClickHouse, where columnar storage makes the "scan a billion spans"
  #  queries fast. Internal-only — the worker writes here, the web app reads.
  #
  #  The alpine variant keeps the image small (~700 MB) and is fine for a
  #  sandbox-scale data volume; for production you'd want the standard image
  #  (zstd-bundled, slightly larger but with more codecs).
  # =========================================================================
  langfuse-clickhouse:
    image: clickhouse/clickhouse-server:24.10-alpine
    container_name: langfuse-clickhouse
    restart: unless-stopped

    # 101:101 is the `clickhouse` user/group baked into the upstream image.
    # The official Langfuse compose sets this explicitly to make the volume
    # files owned by the right uid when mounted on host filesystems that
    # care about ownership (most do).
    user: "101:101"

    environment:
      CLICKHOUSE_DB: langfuse
      CLICKHOUSE_USER: langfuse
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}

    volumes:
      - langfuse-clickhouse-data:/var/lib/clickhouse

    networks:
      - llm-stack

    # No host ports — only the langfuse-web and langfuse-worker containers
    # reach this. If you need to poke at it interactively:
    #   docker compose exec langfuse-clickhouse clickhouse-client \
    #     --user langfuse --password "$CLICKHOUSE_PASSWORD" --database langfuse

    healthcheck:
      # ClickHouse binds to 0.0.0.0:8123 (IPv4 only) by default; alpine's
      # wget tries the `localhost` AAAA record first and gets a connection
      # refused on ::1 even though IPv4 is happy. Use 127.0.0.1 explicitly.
      # /ping returns 200 once the HTTP listener is up; the native-protocol
      # listener on :9000 comes up a moment later but the migration runner
      # on the web side waits for it on its own.
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:8123/ping || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

  # =========================================================================
  #  Langfuse Redis (Phase 2.1) — ingest queue
  # -------------------------------------------------------------------------
  #  Sits between the web app (which buffers a few-KB event blob per request)
  #  and the worker (which drains the queue and writes to CH/Postgres/Minio).
  #  Decoupling these two means a slow ClickHouse insert won't back-pressure
  #  the trace-receive endpoint — that's the whole reason v3 exists.
  # =========================================================================
  langfuse-redis:
    image: redis:7-alpine
    container_name: langfuse-redis
    restart: unless-stopped

    # `requirepass` makes auth mandatory for every command. We thread the
    # password in through an env var so the healthcheck below can reuse it
    # without baking it into the test string.
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}

    # `noeviction` mirrors the Langfuse-recommended Redis policy — the queue
    # is durable; we want OOM errors over silent dropped events.
    command:
      - sh
      - -c
      - 'exec redis-server --requirepass "$$REDIS_PASSWORD" --maxmemory-policy noeviction --appendonly yes'

    volumes:
      - langfuse-redis-data:/data

    networks:
      - llm-stack

    healthcheck:
      # Compose escapes `$$` to `$`, so the shell inside the container sees
      # `$REDIS_PASSWORD` which is the env var we set above. `--no-auth-warning`
      # suppresses the stderr nag about passing -a on the command line.
      test: ["CMD-SHELL", "redis-cli -a \"$$REDIS_PASSWORD\" --no-auth-warning ping | grep -q PONG"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  # =========================================================================
  #  Langfuse Minio (Phase 2.1) — S3-compatible blob store
  # -------------------------------------------------------------------------
  #  Langfuse v3 stages incoming event batches as S3 objects before the
  #  worker inserts them into ClickHouse. Using Minio (instead of LocalStack
  #  or a real AWS bucket) keeps the sandbox self-contained.
  #
  #  Bucket creation: the official image doesn't auto-create buckets, but
  #  Langfuse's S3 client doesn't create them either — it expects the bucket
  #  to exist. We pre-create it via the entrypoint trick from the upstream
  #  Langfuse compose: `mkdir -p /data/<bucket>` before `minio server` runs.
  # =========================================================================
  langfuse-minio:
    image: minio/minio:RELEASE.2024-11-07T00-52-20Z
    container_name: langfuse-minio
    restart: unless-stopped

    entrypoint: sh
    command:
      - -c
      - 'mkdir -p /data/langfuse && exec minio server --address ":9000" --console-address ":9001" /data'

    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}

    volumes:
      - langfuse-minio-data:/data

    networks:
      - llm-stack

    # No host ports by default — the web console on 9001 is a debugging
    # nicety we don't need wired up unless you want to poke around at
    # bucket contents. Uncomment if you do:
    #   ports:
    #     - "9091:9001"

    healthcheck:
      # The image bundles the `mc` CLI; `mc ready local` uses the bundled
      # `local` alias to self-check the API endpoint.
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # =========================================================================
  #  Langfuse v3 web app  (Phase 2.1)
  # -------------------------------------------------------------------------
  #  Replaces the Phase 1 v2 single-container deployment. v3 splits ingest
  #  across this `langfuse` web container and the `langfuse-worker` below.
  #  The web container handles UI, API, and OTLP receive; everything that
  #  actually inserts into ClickHouse runs in the worker.
  #
  #  v3 brings OTLP/HTTP at /api/public/otel/v1/traces back online — the
  #  hook Phase 2.2 (OpenLLMetry + OTel Collector) plugs into.
  # =========================================================================
  langfuse:
    # Pinned to a specific v3 minor. The `:3` rolling tag would auto-adopt
    # new minors and risk a schema migration mid-investigation; the explicit
    # pin keeps the bring-up reproducible. See VERSIONS.md for the bump
    # procedure.
    image: langfuse/langfuse:3.174.1
    container_name: langfuse
    restart: unless-stopped

    # Merge the shared anchor in — see x-langfuse-env at the top of the file.
    environment:
      <<: *langfuse-env

    ports:
      - "3001:3000"                          # host 3001 → container 3000 (avoids Grafana clash)

    networks:
      - llm-stack

    depends_on:
      langfuse-db:
        condition: service_healthy
      langfuse-clickhouse:
        condition: service_healthy
      langfuse-redis:
        condition: service_healthy
      langfuse-minio:
        condition: service_healthy

    # The v3 image still ships Next.js in standalone mode (binds to the
    # container's hostname/IP rather than 0.0.0.0). Same `$(hostname)`
    # workaround as v2 — see the Phase 1 comment for the long-form
    # explanation. `start_period` is generous because the first run also
    # runs Prisma migrations against Postgres AND ClickHouse schema migrations.
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://$(hostname):3000/api/public/health > /dev/null"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 120s

  # =========================================================================
  #  Langfuse v3 worker  (Phase 2.1)
  # -------------------------------------------------------------------------
  #  Drains the Redis queue, reads the staged S3 object, inserts rows into
  #  ClickHouse and metadata into Postgres. No external traffic — all comms
  #  are inside the network.
  # =========================================================================
  langfuse-worker:
    image: langfuse/langfuse-worker:3.174.1
    container_name: langfuse-worker
    restart: unless-stopped

    environment:
      <<: *langfuse-env

    networks:
      - llm-stack

    # No published port — the worker exposes its own /api/health on 3030
    # but only inside the network. We don't depend on the web container
    # being healthy; both wait on the same backing services and may come
    # up in either order.
    depends_on:
      langfuse-db:
        condition: service_healthy
      langfuse-clickhouse:
        condition: service_healthy
      langfuse-redis:
        condition: service_healthy
      langfuse-minio:
        condition: service_healthy

    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://$(hostname):3030/api/health > /dev/null"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  # =========================================================================
  #  OpenTelemetry Collector  (Phase 2.2) — trace routing hub
  # -------------------------------------------------------------------------
  #  Receives OTLP/HTTP from the agent (and any future emitter), batches,
  #  and forwards to Langfuse v3's OTLP endpoint with Basic auth.
  #  Centralises the Langfuse credentials so emitters don't see them.
  #  See otel/README.md and otel/config.yaml for the full story.
  # =========================================================================
  otel-collector:
    # `contrib` distribution because the `basicauth` extension and
    # `attributes` processor live there, not in core.
    image: otel/opentelemetry-collector-contrib:0.114.0
    container_name: otel-collector
    restart: unless-stopped

    command: ["--config=/etc/otel/config.yaml"]

    environment:
      # Consumed by the basicauth/langfuse extension. The app itself no
      # longer needs these; they only live here now.
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY}

    volumes:
      - ./otel/config.yaml:/etc/otel/config.yaml:ro

    ports:
      - "4318:4318"    # OTLP/HTTP receiver — apps push here (also reachable from host shell for smoke tests)
      - "13133:13133"  # health endpoint used by docker-compose's healthcheck (and humans)
      - "8888:8888"    # the collector's own /metrics

    networks:
      - llm-stack

    depends_on:
      # Langfuse needs to be up before the basicauth handshake can succeed
      # on the very first batch. The collector itself will still start, but
      # waiting here avoids a wave of `connection refused` log noise.
      langfuse:
        condition: service_healthy

    # No healthcheck on this service. The contrib image is distroless
    # (`gcr.io/distroless/static`) — no shell, no wget, no curl, only the
    # `/otelcol-contrib` binary. We *could* bundle a healthcheck tool by
    # building a custom image, but that's heavy ceremony for a sandbox.
    # Consumers use `condition: service_started` for this service. The
    # collector startup is fast (~2 s) and if it fails the docker logs
    # show it immediately; `restart: unless-stopped` plus the SDK's
    # built-in retry handle the (rare) startup race.

  # =========================================================================
  #  DCGM exporter (GPU telemetry → Prometheus)
  # -------------------------------------------------------------------------
  #  Talks to the NVIDIA driver via DCGM (NVIDIA Data Center GPU Manager)
  #  and exposes a Prometheus-format /metrics endpoint on :9400. Gives us
  #  the *honest* utilisation numbers (PROF_SM_ACTIVE, TENSOR_ACTIVE,
  #  DRAM_ACTIVE) that nvidia-smi's coarse GPU-Util hides.
  # =========================================================================
  dcgm-exporter:
    # The two-part tag = `<dcgm-exporter version>-<DCGM library version>`.
    # Bumping for newer drivers (580.x in this lab) may need a 4.x image;
    # if this one fails with "driver version mismatch" pinpoint a newer tag
    # on NGC: https://catalog.ngc.nvidia.com/orgs/nvidia/teams/k8s/containers/dcgm-exporter/tags
    image: nvcr.io/nvidia/k8s/dcgm-exporter:3.3.9-3.6.1-ubuntu22.04
    container_name: dcgm-exporter
    restart: unless-stopped

    # Pass the custom field list. Without `-f`, the exporter loads its
    # default ~80-metric CSV — way more than we need.
    command:
      - -f
      - /etc/dcgm-exporter/dcp-metrics-included.csv

    # Some kernels / DCGM versions need elevated capabilities for the
    # profiling counters (PROF_*). SYS_ADMIN is the standard recommendation;
    # without it you'll still get DEV_* but PROF_* may be empty.
    cap_add:
      - SYS_ADMIN

    ports:
      - "9400:9400"

    volumes:
      - ./dcgm/dcp-metrics-included.csv:/etc/dcgm-exporter/dcp-metrics-included.csv:ro

    networks:
      - llm-stack

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all                       # share with vllm-engine; both can access the GPU concurrently
              capabilities: [gpu, utility]     # `utility` lets DCGM read management counters

    # DCGM exporter image is minimal: only bash, no wget/curl/python. Use
    # bash's built-in /dev/tcp device file to make a real HTTP GET and
    # check the status line. CMD form (not CMD-SHELL) because we need bash
    # specifically — /bin/sh in this image may not be bash everywhere.
    healthcheck:
      test:
        - "CMD"
        - "bash"
        - "-c"
        - "exec 3<>/dev/tcp/localhost/9400; printf 'GET /metrics HTTP/1.0\\r\\n\\r\\n' >&3; head -n1 <&3 | grep -q ' 200 '"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # =========================================================================
  #  node-exporter (host OS telemetry → Prometheus)
  # -------------------------------------------------------------------------
  #  Runs on the host's PID and network namespaces so it can read the real
  #  /proc and /sys, not the container's. Exposes CPU, memory, disk, and
  #  network counters on :9100/metrics.
  # =========================================================================
  node-exporter:
    image: prom/node-exporter:v1.8.2
    container_name: node-exporter
    restart: unless-stopped

    # Read-only bind mounts of the host's /proc, /sys, and root. The
    # `:ro,rslave` propagation lets us see new mounts that appear after
    # container start (e.g. a USB drive); without it we'd be stuck on the
    # snapshot at startup.
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro,rslave

    # Point the collectors at the bind-mounted host paths instead of the
    # container's own. The filesystem mount-points exclude pattern avoids
    # reporting the pseudo-filesystems we're not interested in.
    command:
      - --path.procfs=/host/proc
      - --path.sysfs=/host/sys
      - --path.rootfs=/rootfs
      - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)
      - --collector.filesystem.fs-types-exclude=^(autofs|binfmt_misc|bpf|cgroup2?|configfs|debugfs|devpts|devtmpfs|fusectl|hugetlbfs|iso9660|mqueue|nsfs|overlay|proc|procfs|pstore|rpc_pipefs|securityfs|selinuxfs|squashfs|sysfs|tracefs)$$

    ports:
      - "9100:9100"

    networks:
      - llm-stack

    # node-exporter has no /health endpoint; /metrics is the next best thing.
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9100/metrics > /dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # =========================================================================
  #  cAdvisor (per-container telemetry → Prometheus)
  # -------------------------------------------------------------------------
  #  Reads each container's cgroup files and exposes CPU/memory/IO usage
  #  per-container on :8080/metrics. This is what tells you "the litellm
  #  container is using 200 MB RAM" vs node-exporter's "the host is using
  #  6 GB" — different layer, different question.
  # =========================================================================
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.2
    container_name: cadvisor
    restart: unless-stopped

    # cAdvisor needs read access to the host's cgroup filesystem and to
    # Docker's metadata. It also wants /dev/kmsg so it can correlate OOM
    # kills — important when you're saturating GPUs and the kernel starts
    # culling processes.
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    devices:
      - /dev/kmsg:/dev/kmsg
    privileged: true                          # needed for perf-event access on some kernels

    # Skip the metric families that bloat output without telling us anything
    # useful for an LLM-serving workload. Valid categories vary by cAdvisor
    # version — `accelerator` was removed somewhere around v0.49, so don't
    # add it back. To see the full list: `cadvisor --help | grep -A2 disable_metrics`
    command:
      - --docker_only=true
      - --housekeeping_interval=10s
      - --disable_metrics=advtcp,hugetlb,memory_numa,percpu,referenced_memory,resctrl,sched,tcp,udp

    ports:
      - "8080:8080"

    networks:
      - llm-stack

    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/healthz > /dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # =========================================================================
  #  Prometheus (metrics store + recording rules)
  # -------------------------------------------------------------------------
  #  Pulls /metrics from every other service every 5 s, stores in its TSDB,
  #  evaluates recording rules every 15 s so dashboards can hit pre-computed
  #  series instead of recomputing histogram_quantile on every panel load.
  # =========================================================================
  prometheus:
    image: prom/prometheus:v3.1.0
    container_name: prometheus
    restart: unless-stopped

    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      # Keep ~7 days of data — plenty for a sandbox, capped so the volume
      # doesn't grow without bound while you forget about it.
      - --storage.tsdb.retention.time=7d
      # /-/reload over HTTP — handy for `curl -X POST :9090/-/reload`
      # after editing scrape config without bouncing the container.
      - --web.enable-lifecycle

    ports:
      - "9090:9090"

    volumes:
      # Bind-mount the config (read-only) — edit-and-reload workflow.
      - ./prometheus:/etc/prometheus:ro
      # TSDB data lives in a named volume; survives `compose down`.
      - prometheus-data:/prometheus

    networks:
      - llm-stack

    # Don't gate on dependents being healthy — Prometheus should start up
    # even if some scrape targets are down (it'll just mark them DOWN in
    # /targets). That's the right behaviour for a monitoring system.

    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # =========================================================================
  #  Loki (log aggregation — Phase 2.3, third observability pillar)
  # -------------------------------------------------------------------------
  #  Single-binary deployment, filesystem-backed. Receives lines from
  #  promtail, indexes by label, stores chunks on the `loki-data` volume.
  #  See loki/README.md for the per-knob walkthrough.
  # =========================================================================
  loki:
    image: grafana/loki:3.3.0
    container_name: loki
    restart: unless-stopped

    command: ["-config.file=/etc/loki/loki.yaml"]

    volumes:
      - ./loki/loki.yaml:/etc/loki/loki.yaml:ro
      - loki-data:/loki

    ports:
      - "3100:3100"                        # host shell can curl /loki/api/v1/* directly

    networks:
      - llm-stack

    healthcheck:
      # Loki's alpine-derived image ships BusyBox wget. /ready returns 200
      # only after the ingester has finished its 15 s warm-up window — so
      # start_period needs to clear that.
      test: ["CMD", "wget", "-qO-", "http://localhost:3100/ready"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # =========================================================================
  #  Promtail (log scraper — Phase 2.3)
  # -------------------------------------------------------------------------
  #  Discovers compose-managed containers via the host docker socket,
  #  tails each one's stdout/stderr file, ships to Loki labelled by
  #  compose service name. See promtail/README.md.
  # =========================================================================
  promtail:
    image: grafana/promtail:3.3.0
    container_name: promtail
    restart: unless-stopped

    command: ["-config.file=/etc/promtail/promtail.yaml"]

    volumes:
      # The docker socket — used for service discovery (lists containers,
      # reads their labels). Read-only is enough for promtail's needs.
      - /var/run/docker.sock:/var/run/docker.sock:ro
      # Where docker writes the json-file logs per container. Promtail
      # tails the file pointed to by SD; the docker pipeline stage parses
      # the json wrapper.
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - ./promtail/promtail.yaml:/etc/promtail/promtail.yaml:ro

    networks:
      - llm-stack

    depends_on:
      loki:
        condition: service_healthy

    # No published port — /ready and /metrics on :9080 are reachable
    # inside the network only (or via `docker compose exec promtail`).

    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9080/ready"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # =========================================================================
  #  Grafana (dashboards over Prometheus data)
  # -------------------------------------------------------------------------
  #  Datasource and dashboards come from `provisioning/` — no manual UI
  #  setup. Two starter dashboards land in the "LLM Stack" folder:
  #    01-llm-overview     — request rate, latency, tokens, queue, KV cache
  #    02-gpu-saturation   — DCGM power/temp/mem/clocks + p95 overlay
  # =========================================================================
  grafana:
    image: grafana/grafana:11.4.0
    container_name: grafana
    restart: unless-stopped

    environment:
      # Sandbox-only: anonymous read so you don't have to log in. For any
      # real deployment, replace with proper auth.
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_AUTH_DISABLE_LOGIN_FORM: "false"        # admin login still works for editing
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin          # rotate before any non-local use
      # Disable telemetry to Grafana Labs.
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
      # Don't auto-install the bundled welcome dashboard — we have our own.
      GF_INSTALL_PLUGINS: ""

    ports:
      - "3000:3000"

    volumes:
      # Provisioning: datasource + dashboard-provider config. Read-only.
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      # Dashboards loaded by the file provider. Read-only — edits in the UI
      # are kept in Grafana's DB but the source-of-truth JSON stays in git.
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      # Grafana's own SQLite + plugins.
      - grafana-data:/var/lib/grafana

    networks:
      - llm-stack

    depends_on:
      prometheus:
        condition: service_healthy
      loki:
        # Phase 2.3: Grafana's Loki datasource pings on startup; if Loki
        # isn't healthy yet the datasource shows red until next refresh.
        condition: service_healthy

    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health > /dev/null"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # =========================================================================
  #  mock-services (tool backend for the agent app)
  # -------------------------------------------------------------------------
  #  Tiny FastAPI app the agent's LangChain tools call over HTTP. The whole
  #  reason this is a separate container (not in-process functions) is so
  #  Langfuse traces contain real network spans under each tool span.
  #  Also exposes its own /metrics for Prometheus — a seventh scrape target.
  # =========================================================================
  mock-services:
    build:
      context: ./mock-services
    image: llm-stack/mock-services:phase-1.2
    container_name: mock-services
    restart: unless-stopped

    ports:
      - "9000:9000"

    networks:
      - llm-stack

    healthcheck:
      # Image is python:3.11-slim — no wget or curl, but Python is right there.
      test: ["CMD", "python3", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:9000/health',timeout=3).status==200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # =========================================================================
  #  Streamlit + LangChain agent app
  # -------------------------------------------------------------------------
  #  The reason all the rest of this exists. Streamlit chat UI; each turn
  #  invokes a LangChain agent that can call any of five tools. OpenLLMetry
  #  (Traceloop) auto-instruments LangChain + the openai client + httpx,
  #  pushing OTLP/HTTP to Langfuse.
  # =========================================================================
  app:
    build:
      context: ./app
    image: llm-stack/app:phase-1.2
    container_name: app
    restart: unless-stopped

    environment:
      # Gateway endpoint and master key. The app talks to LiteLLM, never
      # to vLLM directly — that's the orchestration lesson.
      OPENAI_API_BASE: http://litellm:4000
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY}
      # Tracing (Phase 2.2): the app emits OTLP/HTTP to the otel-collector,
      # which holds the Langfuse credentials and forwards to v3. The app
      # itself doesn't know about Langfuse anymore.
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      # Pin protocol explicitly so traceloop-sdk picks the HTTP/protobuf
      # exporter (otherwise some versions default to gRPC, which the
      # collector also accepts on :4317 internally but it's cleaner to be
      # explicit about which port the app uses).
      OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
      OTEL_SERVICE_NAME: llm-sandbox-app
      # Disable Traceloop's metrics export — our otel/config.yaml only
      # defines a `traces` pipeline, so the SDK's metrics POSTs return 404
      # and clutter the app's stderr. Prometheus + the collector's own
      # /metrics:8888 already give us the observability we want; we don't
      # need additional app-level OTel metrics on this rig.
      TRACELOOP_METRICS_ENABLED: "false"
      # Tool backend.
      MOCK_SERVICES_URL: http://mock-services:9000

    ports:
      - "8501:8501"

    networks:
      - llm-stack

    depends_on:
      litellm:
        condition: service_healthy
      mock-services:
        condition: service_healthy
      otel-collector:
        # Distroless image has no healthcheck — see otel-collector block.
        # `service_started` is the right gate; the SDK retries if a span
        # arrives before the collector is ready.
        condition: service_started

    # Streamlit's `/_stcore/health` returns "ok" once the script is loaded.
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8501/_stcore/health',timeout=3).status==200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

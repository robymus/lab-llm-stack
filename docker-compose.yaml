# =============================================================================
#  LLM SRE Sandbox — Phase 1.0 compose file
# -----------------------------------------------------------------------------
#  Reading order:
#    1. Top-level keys (name, networks, volumes) — the substrate everything
#       else hangs off.
#    2. Services, in dependency order: vllm-engine → litellm → langfuse-db →
#       langfuse. Each block opens with a one-line summary, then settings, and
#       every non-obvious flag has an inline comment explaining *why* it's set.
#
#  Conventions:
#    - All services join one user-defined bridge network (`llm-stack`) so
#      service names act as DNS — no `localhost`, no published-port plumbing
#      between containers.
#    - Healthchecks are explicit on every long-lived service; `depends_on`
#      uses `condition: service_healthy` so dependent services don't race
#      against startup.
#    - Image tags are pinned to specific versions. Phase 1.4 re-verifies them;
#      if you bump one, regenerate the smoke tests in the relevant README.
#    - Secrets come from `.env` (loaded automatically by compose). Do not
#      inline secrets here.
#
#  The compose `version:` key is deliberately omitted — it's a no-op since
#  Compose v2 and the spec recommends dropping it.
# =============================================================================

name: llm-stack   # explicit project name; otherwise compose derives it from
                  # the directory name, which changes if anyone clones into a
                  # differently-named folder.

# ---------------------------------------------------------------------------
#  Networks
# ---------------------------------------------------------------------------
#  Single bridge network. Container DNS resolves service names to internal
#  IPs (e.g. the app reaches the gateway as http://litellm:4000), which is
#  what makes Phase 2's backend-swap trivial — only the gateway config moves.
networks:
  llm-stack:
    driver: bridge

# ---------------------------------------------------------------------------
#  Named volumes
# ---------------------------------------------------------------------------
#  Anything that holds state we want to survive `docker compose down` lives
#  here. We deliberately avoid bind-mounting into the repo for state dirs —
#  it creates permission headaches and pollutes git status.
volumes:
  hf-cache:           # HuggingFace model cache shared across vLLM restarts;
                      # downloading Qwen2.5-3B-AWQ takes ~2 GB / a few minutes.
  langfuse-pg-data:   # Langfuse's Postgres data dir.
  prometheus-data:    # Prometheus TSDB (added in Phase 1.1; declared now so
                      # the file stays stable as we expand).
  grafana-data:       # Grafana sqlite + plugin cache (Phase 1.1).

# ---------------------------------------------------------------------------
#  Services
# ---------------------------------------------------------------------------
services:

  # =========================================================================
  #  vLLM inference engine
  # -------------------------------------------------------------------------
  #  Serves the model over an OpenAI-compatible API on :8000 and exposes
  #  Prometheus metrics on the same port at /metrics (no separate exporter
  #  needed). This is the only service that requires the NVIDIA Container
  #  Toolkit on the host.
  # =========================================================================
  vllm-engine:
    # v0.6.6 is the first release where the AWQ-Marlin kernel for Ada
    # (compute capability 8.9) is stable. Bumping requires re-checking that
    # `--quantization awq_marlin` still works on the 4060 — change carefully.
    image: vllm/vllm-openai:v0.6.6
    container_name: vllm-engine
    restart: unless-stopped

    # Each flag below maps to a learning point — see vllm/README.md for the
    # long-form explanation. Order matches the README for easy cross-reference.
    command:
      - --model
      - Qwen/Qwen2.5-3B-Instruct-AWQ          # ~2.2 GB AWQ-INT4 weights; fits 8 GB with KV-cache headroom
      - --quantization
      - awq_marlin                            # fast AWQ kernel for Ada; falls back to `awq` if Marlin breaks
      - --max-model-len
      - "4096"                                # caps KV cache; raise only if you've measured headroom
      - --gpu-memory-utilization
      - "0.85"                                # leave ~15% slack for the runtime allocator's quirks
      - --enable-prefix-caching               # makes prefix-cache-hit metrics non-zero — observable lesson
      - --served-model-name
      - qwen-chat                             # stable alias the gateway routes to; weight name can change
      # Tool-calling support — required for the agent app's tool_choice="auto".
      # Without these vLLM 400s with: "auto tool choice requires --enable-auto-tool-choice".
      # `hermes` is the parser that matches Qwen2.5's chat template; other models
      # use different parsers (e.g. `llama3_json` for Llama 3.x).
      - --enable-auto-tool-choice
      - --tool-call-parser
      - hermes
      - --host
      - 0.0.0.0
      - --port
      - "8000"

    # Real env (not config flags) — only the HF token, which gates model
    # download. Public models like Qwen2.5 don't need it; gated models do.
    environment:
      HF_TOKEN: ${HF_TOKEN}
      HUGGING_FACE_HUB_TOKEN: ${HF_TOKEN}    # different libraries read different names; set both
      # vLLM emits Prometheus metrics by default; explicit for clarity.
      VLLM_LOGGING_LEVEL: INFO

    ports:
      - "8000:8000"                          # exposed on the host so `curl :8000/metrics` works from your shell

    volumes:
      # Persist downloaded weights so a `down` + `up` doesn't re-download
      # the model. Mounted at root-cache because the image runs as root.
      - hf-cache:/root/.cache/huggingface

    networks:
      - llm-stack

    # GPU access. Requires `nvidia-container-toolkit` on the host AND the
    # nvidia runtime registered with Docker (`docker info | grep nvidia`).
    # Without these two, this block silently does nothing and the container
    # starts CPU-only — which then fails as soon as vLLM tries to allocate
    # CUDA memory. See scripts/preflight.sh.
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

    # Loading the model takes ~30-90s on first run. The `start_period` keeps
    # the container marked as "starting" (not "unhealthy") during that
    # window, so dependent services wait properly instead of failing fast.
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 120s

    # Shared-memory size: vLLM's worker processes communicate via shm and
    # the default 64M is too small for any non-toy model.
    shm_size: "2gb"

  # =========================================================================
  #  LiteLLM gateway
  # -------------------------------------------------------------------------
  #  The orchestration seam. One YAML file decides which backend handles
  #  which logical model name — swapping vLLM for Triton in Phase 2 is a
  #  one-line change here.
  # =========================================================================
  litellm:
    # LiteLLM doesn't publish clean semver tags for the `main-stable` channel,
    # so we pin by manifest digest — fully reproducible, immune to the
    # tag being moved upstream. See VERSIONS.md for the human-readable
    # version (`main-stable` as of 2026-04-26) and the bump procedure.
    image: ghcr.io/berriai/litellm@sha256:6c82d338a60e7b273ae46bf1d8db814d2856ae010f96c44eeadde574d3893f76
    container_name: litellm
    restart: unless-stopped

    # The CLI flag points at the config file we mount below. `--detailed_debug`
    # is helpful while learning; turn it off once dashboards work.
    command:
      - --config
      - /app/config.yaml
      - --port
      - "4000"
      - --host
      - 0.0.0.0
      - --num_workers
      - "1"                                  # single worker keeps logs readable; raise for load tests

    environment:
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY}
      LITELLM_LOG: INFO

    ports:
      - "4000:4000"                          # gateway API + /metrics on the same port

    volumes:
      # Bind-mount the config so edits take effect after `docker compose restart litellm`
      # without a rebuild. Read-only so the container can't write back.
      - ./litellm/config.yaml:/app/config.yaml:ro

    networks:
      - llm-stack

    depends_on:
      vllm-engine:
        condition: service_healthy           # don't start until vLLM can answer requests

    # LiteLLM's slim image has neither `wget` nor `curl`, but it always has
    # Python (it's a Python app). urllib is in the stdlib, so no extras to
    # install. We hit `/health/liveliness` because it's the lightest of the
    # several health endpoints — just confirms the process is alive,
    # without probing backends (which would couple this healthcheck to
    # vllm-engine's state).
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:4000/health/liveliness',timeout=3).status==200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # =========================================================================
  #  Langfuse Postgres
  # -------------------------------------------------------------------------
  #  Storage backend for Langfuse v2. Internal-only — no host port. We pin
  #  to Postgres 16 because Langfuse v2's migrations are tested against
  #  14-16; PG 17 may or may not work, no need to find out the hard way.
  # =========================================================================
  langfuse-db:
    image: postgres:16-alpine
    container_name: langfuse-db
    restart: unless-stopped

    environment:
      POSTGRES_USER: langfuse
      POSTGRES_PASSWORD: ${LANGFUSE_DB_PASSWORD}
      POSTGRES_DB: langfuse

    volumes:
      - langfuse-pg-data:/var/lib/postgresql/data

    networks:
      - llm-stack

    # No published port — Langfuse reaches it via service-name DNS only.
    # If you need to poke at it: `docker compose exec langfuse-db psql -U langfuse`.

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U langfuse -d langfuse"]
      interval: 5s
      timeout: 3s
      retries: 10

  # =========================================================================
  #  Langfuse v2 web app
  # -------------------------------------------------------------------------
  #  Hosts the UI, the API for the SDK, AND the OTLP HTTP ingestion endpoint
  #  used by OpenLLMetry in Phase 1.2. Single container, no worker — that's
  #  the simplification v3 trades away in exchange for ClickHouse-backed
  #  analytics.
  # =========================================================================
  langfuse:
    # Pinned to a specific v2.x minor — `:2` is a moving tag that would auto-
    # adopt new minors and could subtly change behaviour mid-investigation.
    # See VERSIONS.md for what was verified at this pin.
    image: langfuse/langfuse:2.95.11
    container_name: langfuse
    restart: unless-stopped

    environment:
      # Connection to the Postgres above. Use the service name as host —
      # no host port is published, so this is the only way to reach it.
      DATABASE_URL: postgresql://langfuse:${LANGFUSE_DB_PASSWORD}@langfuse-db:5432/langfuse
      # NextAuth expects to know its own external URL. We publish on 3001
      # to avoid colliding with Grafana on 3000.
      NEXTAUTH_URL: http://localhost:3001
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      SALT: ${LANGFUSE_SALT}
      # Disable Langfuse's anonymous usage telemetry — this is a learning
      # sandbox, no need to ship pings out.
      TELEMETRY_ENABLED: "false"
      # Phase 1.2 needs OTLP enabled; it's on by default in v2 but explicit
      # documentation is cheap.
      LANGFUSE_ENABLE_EXPERIMENTAL_FEATURES: "true"

    ports:
      - "3001:3000"                          # host 3001 → container 3000 (avoids Grafana clash)

    networks:
      - llm-stack

    depends_on:
      langfuse-db:
        condition: service_healthy

    # Langfuse v2 ships Next.js in "standalone" mode, which binds the HTTP
    # listener to the container's own hostname/IP (e.g. 172.20.0.4:3000)
    # rather than 0.0.0.0:3000. Result: from inside the container,
    # `localhost:3000` and `127.0.0.1:3000` are refused; only the
    # container-hostname (or its IP) works. From the host this is hidden
    # because we publish 3001:3000, so external traffic still arrives fine.
    # `$(hostname)` resolves via /etc/hosts to the bound IP at check time.
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://$(hostname):3000/api/public/health > /dev/null"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # =========================================================================
  #  DCGM exporter (GPU telemetry → Prometheus)
  # -------------------------------------------------------------------------
  #  Talks to the NVIDIA driver via DCGM (NVIDIA Data Center GPU Manager)
  #  and exposes a Prometheus-format /metrics endpoint on :9400. Gives us
  #  the *honest* utilisation numbers (PROF_SM_ACTIVE, TENSOR_ACTIVE,
  #  DRAM_ACTIVE) that nvidia-smi's coarse GPU-Util hides.
  # =========================================================================
  dcgm-exporter:
    # The two-part tag = `<dcgm-exporter version>-<DCGM library version>`.
    # Bumping for newer drivers (580.x in this lab) may need a 4.x image;
    # if this one fails with "driver version mismatch" pinpoint a newer tag
    # on NGC: https://catalog.ngc.nvidia.com/orgs/nvidia/teams/k8s/containers/dcgm-exporter/tags
    image: nvcr.io/nvidia/k8s/dcgm-exporter:3.3.9-3.6.1-ubuntu22.04
    container_name: dcgm-exporter
    restart: unless-stopped

    # Pass the custom field list. Without `-f`, the exporter loads its
    # default ~80-metric CSV — way more than we need.
    command:
      - -f
      - /etc/dcgm-exporter/dcp-metrics-included.csv

    # Some kernels / DCGM versions need elevated capabilities for the
    # profiling counters (PROF_*). SYS_ADMIN is the standard recommendation;
    # without it you'll still get DEV_* but PROF_* may be empty.
    cap_add:
      - SYS_ADMIN

    ports:
      - "9400:9400"

    volumes:
      - ./dcgm/dcp-metrics-included.csv:/etc/dcgm-exporter/dcp-metrics-included.csv:ro

    networks:
      - llm-stack

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all                       # share with vllm-engine; both can access the GPU concurrently
              capabilities: [gpu, utility]     # `utility` lets DCGM read management counters

    # DCGM exporter image is minimal: only bash, no wget/curl/python. Use
    # bash's built-in /dev/tcp device file to make a real HTTP GET and
    # check the status line. CMD form (not CMD-SHELL) because we need bash
    # specifically — /bin/sh in this image may not be bash everywhere.
    healthcheck:
      test:
        - "CMD"
        - "bash"
        - "-c"
        - "exec 3<>/dev/tcp/localhost/9400; printf 'GET /metrics HTTP/1.0\\r\\n\\r\\n' >&3; head -n1 <&3 | grep -q ' 200 '"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # =========================================================================
  #  node-exporter (host OS telemetry → Prometheus)
  # -------------------------------------------------------------------------
  #  Runs on the host's PID and network namespaces so it can read the real
  #  /proc and /sys, not the container's. Exposes CPU, memory, disk, and
  #  network counters on :9100/metrics.
  # =========================================================================
  node-exporter:
    image: prom/node-exporter:v1.8.2
    container_name: node-exporter
    restart: unless-stopped

    # Read-only bind mounts of the host's /proc, /sys, and root. The
    # `:ro,rslave` propagation lets us see new mounts that appear after
    # container start (e.g. a USB drive); without it we'd be stuck on the
    # snapshot at startup.
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro,rslave

    # Point the collectors at the bind-mounted host paths instead of the
    # container's own. The filesystem mount-points exclude pattern avoids
    # reporting the pseudo-filesystems we're not interested in.
    command:
      - --path.procfs=/host/proc
      - --path.sysfs=/host/sys
      - --path.rootfs=/rootfs
      - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)
      - --collector.filesystem.fs-types-exclude=^(autofs|binfmt_misc|bpf|cgroup2?|configfs|debugfs|devpts|devtmpfs|fusectl|hugetlbfs|iso9660|mqueue|nsfs|overlay|proc|procfs|pstore|rpc_pipefs|securityfs|selinuxfs|squashfs|sysfs|tracefs)$$

    ports:
      - "9100:9100"

    networks:
      - llm-stack

    # node-exporter has no /health endpoint; /metrics is the next best thing.
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9100/metrics > /dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # =========================================================================
  #  cAdvisor (per-container telemetry → Prometheus)
  # -------------------------------------------------------------------------
  #  Reads each container's cgroup files and exposes CPU/memory/IO usage
  #  per-container on :8080/metrics. This is what tells you "the litellm
  #  container is using 200 MB RAM" vs node-exporter's "the host is using
  #  6 GB" — different layer, different question.
  # =========================================================================
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.2
    container_name: cadvisor
    restart: unless-stopped

    # cAdvisor needs read access to the host's cgroup filesystem and to
    # Docker's metadata. It also wants /dev/kmsg so it can correlate OOM
    # kills — important when you're saturating GPUs and the kernel starts
    # culling processes.
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    devices:
      - /dev/kmsg:/dev/kmsg
    privileged: true                          # needed for perf-event access on some kernels

    # Skip the metric families that bloat output without telling us anything
    # useful for an LLM-serving workload. Valid categories vary by cAdvisor
    # version — `accelerator` was removed somewhere around v0.49, so don't
    # add it back. To see the full list: `cadvisor --help | grep -A2 disable_metrics`
    command:
      - --docker_only=true
      - --housekeeping_interval=10s
      - --disable_metrics=advtcp,hugetlb,memory_numa,percpu,referenced_memory,resctrl,sched,tcp,udp

    ports:
      - "8080:8080"

    networks:
      - llm-stack

    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/healthz > /dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # =========================================================================
  #  Prometheus (metrics store + recording rules)
  # -------------------------------------------------------------------------
  #  Pulls /metrics from every other service every 5 s, stores in its TSDB,
  #  evaluates recording rules every 15 s so dashboards can hit pre-computed
  #  series instead of recomputing histogram_quantile on every panel load.
  # =========================================================================
  prometheus:
    image: prom/prometheus:v3.1.0
    container_name: prometheus
    restart: unless-stopped

    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      # Keep ~7 days of data — plenty for a sandbox, capped so the volume
      # doesn't grow without bound while you forget about it.
      - --storage.tsdb.retention.time=7d
      # /-/reload over HTTP — handy for `curl -X POST :9090/-/reload`
      # after editing scrape config without bouncing the container.
      - --web.enable-lifecycle

    ports:
      - "9090:9090"

    volumes:
      # Bind-mount the config (read-only) — edit-and-reload workflow.
      - ./prometheus:/etc/prometheus:ro
      # TSDB data lives in a named volume; survives `compose down`.
      - prometheus-data:/prometheus

    networks:
      - llm-stack

    # Don't gate on dependents being healthy — Prometheus should start up
    # even if some scrape targets are down (it'll just mark them DOWN in
    # /targets). That's the right behaviour for a monitoring system.

    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # =========================================================================
  #  Grafana (dashboards over Prometheus data)
  # -------------------------------------------------------------------------
  #  Datasource and dashboards come from `provisioning/` — no manual UI
  #  setup. Two starter dashboards land in the "LLM Stack" folder:
  #    01-llm-overview     — request rate, latency, tokens, queue, KV cache
  #    02-gpu-saturation   — DCGM power/temp/mem/clocks + p95 overlay
  # =========================================================================
  grafana:
    image: grafana/grafana:11.4.0
    container_name: grafana
    restart: unless-stopped

    environment:
      # Sandbox-only: anonymous read so you don't have to log in. For any
      # real deployment, replace with proper auth.
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_AUTH_DISABLE_LOGIN_FORM: "false"        # admin login still works for editing
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin          # rotate before any non-local use
      # Disable telemetry to Grafana Labs.
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
      # Don't auto-install the bundled welcome dashboard — we have our own.
      GF_INSTALL_PLUGINS: ""

    ports:
      - "3000:3000"

    volumes:
      # Provisioning: datasource + dashboard-provider config. Read-only.
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      # Dashboards loaded by the file provider. Read-only — edits in the UI
      # are kept in Grafana's DB but the source-of-truth JSON stays in git.
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      # Grafana's own SQLite + plugins.
      - grafana-data:/var/lib/grafana

    networks:
      - llm-stack

    depends_on:
      prometheus:
        condition: service_healthy

    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health > /dev/null"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # =========================================================================
  #  mock-services (tool backend for the agent app)
  # -------------------------------------------------------------------------
  #  Tiny FastAPI app the agent's LangChain tools call over HTTP. The whole
  #  reason this is a separate container (not in-process functions) is so
  #  Langfuse traces contain real network spans under each tool span.
  #  Also exposes its own /metrics for Prometheus — a seventh scrape target.
  # =========================================================================
  mock-services:
    build:
      context: ./mock-services
    image: llm-stack/mock-services:phase-1.2
    container_name: mock-services
    restart: unless-stopped

    ports:
      - "9000:9000"

    networks:
      - llm-stack

    healthcheck:
      # Image is python:3.11-slim — no wget or curl, but Python is right there.
      test: ["CMD", "python3", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:9000/health',timeout=3).status==200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # =========================================================================
  #  Streamlit + LangChain agent app
  # -------------------------------------------------------------------------
  #  The reason all the rest of this exists. Streamlit chat UI; each turn
  #  invokes a LangChain agent that can call any of five tools. OpenLLMetry
  #  (Traceloop) auto-instruments LangChain + the openai client + httpx,
  #  pushing OTLP/HTTP to Langfuse.
  # =========================================================================
  app:
    build:
      context: ./app
    image: llm-stack/app:phase-1.2
    container_name: app
    restart: unless-stopped

    environment:
      # Gateway endpoint and master key. The app talks to LiteLLM, never
      # to vLLM directly — that's the orchestration lesson.
      OPENAI_API_BASE: http://litellm:4000
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY}
      # Langfuse v2-compatible SDK reads these directly (public_key, secret_key,
      # host). We send to Langfuse-native ingestion, not OTLP — see
      # app/agent.py for why (v2 doesn't speak OTLP/HTTP).
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY}
      # Tool backend.
      MOCK_SERVICES_URL: http://mock-services:9000

    ports:
      - "8501:8501"

    networks:
      - llm-stack

    depends_on:
      litellm:
        condition: service_healthy
      mock-services:
        condition: service_healthy
      langfuse:
        condition: service_healthy

    # Streamlit's `/_stcore/health` returns "ok" once the script is loaded.
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8501/_stcore/health',timeout=3).status==200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

# =============================================================================
#  CI for llm-stack
# -----------------------------------------------------------------------------
#  Jobs run in parallel; each catches a different category of regression:
#
#    lint       — yamllint, jq JSON validation, ruff (check + format-check)
#    dockerfiles — hadolint Dockerfiles, `docker compose config -q`
#    tests      — pytest for app/ and mock-services/ (matrix)
#
#  Pinning policy: every third-party action is pinned to a commit SHA (not a
#  tag) so the workflow can't change under us without a deliberate bump.
#  Tags can be force-moved; commit SHAs cannot. The `# v4.3.1` comments next
#  to each SHA tell the human which version is referenced. To bump:
#
#    gh api repos/<owner>/<repo>/git/refs/tags \
#      | jq -r '.[] | "\(.ref) -> \(.object.sha)"' | grep <new_tag>
#
#  ruff / pytest / yamllint / hadolint versions are pinned in the relevant
#  requirements file (or in this workflow for hadolint-action's `version:`
#  input), keeping CI deterministic.
# =============================================================================

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same branch — saves minutes on rapid pushes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Minimal permissions: CI only reads the repo, nothing writes back.
permissions:
  contents: read

jobs:

  # ===========================================================================
  #  lint — text-level checks that don't need Docker or service deps
  # ===========================================================================
  lint:
    name: Lint (yaml + json + ruff)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - name: Set up Python 3.11
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.11"
          cache: pip

      - name: Install linters
        # Pins keep CI deterministic. Bumping either is a deliberate commit.
        run: |
          python -m pip install --upgrade pip
          python -m pip install yamllint==1.35.1 ruff==0.15.9

      - name: yamllint
        # Walk every YAML the repo authors. Dashboard JSON is handled in the
        # next step. .yamllint.yml controls the rules.
        run: yamllint -s .

      - name: Validate dashboard JSON
        # Grafana dashboard files must parse as JSON or the provisioner errors
        # at boot. Exit-on-error (`-e`) makes jq return non-zero on parse fail.
        run: |
          set -e
          shopt -s nullglob
          for f in grafana/dashboards/*.json; do
            echo "::group::$f"
            jq -e . "$f" > /dev/null
            echo "::endgroup::"
          done

      - name: ruff check
        # `ruff check` reads pyproject.toml for rule selection and per-file
        # ignores. Output uses GitHub annotation format so failures appear
        # inline on the PR diff.
        run: ruff check --output-format=github app mock-services

      - name: ruff format --check
        # Asserts every Python file is already formatted. Local fix: `ruff format`.
        run: ruff format --check app mock-services

  # ===========================================================================
  #  dockerfiles — Dockerfile lint + compose syntax
  # ===========================================================================
  dockerfiles:
    name: Dockerfiles + compose
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - name: hadolint — app/Dockerfile
        uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5  # v3.3.0
        with:
          dockerfile: app/Dockerfile
          config: .hadolint.yaml

      - name: hadolint — mock-services/Dockerfile
        uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5  # v3.3.0
        with:
          dockerfile: mock-services/Dockerfile
          config: .hadolint.yaml

      - name: Compose syntax check
        # Compose's `config -q` resolves every variable, profile, and
        # depends_on graph — catching typos, dangling references, and
        # broken YAML in one shot. We seed empty values for vars the compose
        # file expects, since CI doesn't have a real .env.
        run: |
          cp .env.example .env
          docker compose config -q

  # ===========================================================================
  #  tests — pytest for each Python service
  # ===========================================================================
  #  Matrix keeps the two services independent: failures point at one
  #  service, not "tests broke somewhere." Each install pulls only that
  #  service's requirements-dev.txt for minimal install time.
  tests:
    name: Tests (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [app, mock-services]
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - name: Set up Python 3.11
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: ${{ matrix.service }}/requirements-dev.txt

      - name: Install ${{ matrix.service }} deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r ${{ matrix.service }}/requirements-dev.txt

      - name: Run pytest
        # We pass the test path explicitly so the matrix shard only runs its
        # own tests. Without this, pyproject.toml's `testpaths` would run
        # both — duplicating work and tangling failure attribution.
        run: pytest ${{ matrix.service }}/tests -v

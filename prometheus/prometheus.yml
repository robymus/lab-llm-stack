# =============================================================================
#  Prometheus scrape configuration
# -----------------------------------------------------------------------------
#  Scrapes the six (will be seven in Phase 1.2) /metrics endpoints in the
#  llm-stack network and evaluates recording rules over the result.
#
#  Convention: every scrape target is reachable by service-name DNS inside
#  the network — same names as in docker-compose.yaml. No localhost.
# =============================================================================

global:
  # 5 s scrape — short enough to see prefill/decode bursts that last only
  # a couple of seconds. Real prod would be 15-60 s; we're explicit-about
  # cardinality and storage in a sandbox.
  scrape_interval: 5s
  # 15 s rule evaluation — derives recording rules at a slower cadence so
  # we don't pay for evaluating expensive PromQL on every scrape.
  evaluation_interval: 15s
  # Labels Prometheus attaches to every series it ingests. Useful when
  # federating multiple Prometheuses; harmless otherwise.
  external_labels:
    cluster: llm-stack
    env: sandbox

rule_files:
  # Pre-compute a small set of high-traffic series (p95 latency, tokens/s,
  # GPU power moving average) so dashboards don't recompute them per panel.
  # See rules/llm.rules.yml for the definitions.
  - /etc/prometheus/rules/llm.rules.yml

scrape_configs:
  # ---------------------------------------------------------------------
  #  vLLM inference engine
  # ---------------------------------------------------------------------
  # Native Prometheus support — no exporter sidecar needed. Same port as
  # the OpenAI API (:8000). Series are prefixed `vllm:` (note the colon).
  - job_name: vllm
    static_configs:
      - targets: ["vllm-engine:8000"]
        labels: { layer: inference }

  # ---------------------------------------------------------------------
  #  Triton Inference Server (Phase 2.0 — opt-in second backend)
  # ---------------------------------------------------------------------
  # Triton's native /metrics endpoint runs on a separate port (8004 here)
  # from its inference API (8002). Series prefix `nv_inference_*` — a
  # genuinely different vocabulary from vLLM's `vllm:*`, so the
  # 03-trt-llm dashboard learns a second metric language. The job will
  # show DOWN whenever the `triton` profile isn't active, which is
  # expected — Prometheus tolerates a missing target without errors.
  - job_name: triton
    static_configs:
      - targets: ["triton-server:8004"]
        labels: { layer: inference }

  # ---------------------------------------------------------------------
  #  LiteLLM gateway
  # ---------------------------------------------------------------------
  # The Prometheus callback (`callbacks: ["prometheus"]` in config.yaml)
  # exposes metrics at /metrics/ — note the TRAILING SLASH. Hitting
  # /metrics returns a 307 redirect, which Prometheus follows but pays
  # for on every scrape. Set the path explicitly.
  - job_name: litellm
    metrics_path: /metrics/
    static_configs:
      - targets: ["litellm:4000"]
        labels: { layer: gateway }

  # ---------------------------------------------------------------------
  #  DCGM exporter (GPU telemetry)
  # ---------------------------------------------------------------------
  - job_name: dcgm
    static_configs:
      - targets: ["dcgm-exporter:9400"]
        labels: { layer: hardware }

  # ---------------------------------------------------------------------
  #  node-exporter (host OS telemetry)
  # ---------------------------------------------------------------------
  - job_name: node
    static_configs:
      - targets: ["node-exporter:9100"]
        labels: { layer: hardware }

  # ---------------------------------------------------------------------
  #  cAdvisor (per-container telemetry)
  # ---------------------------------------------------------------------
  - job_name: cadvisor
    static_configs:
      - targets: ["cadvisor:8080"]
        labels: { layer: hardware }

  # ---------------------------------------------------------------------
  #  mock-services (Phase 1.2 — tool backend for the agent)
  # ---------------------------------------------------------------------
  # FastAPI app with prometheus-fastapi-instrumentator. Series prefixed
  # `http_request_*`. Gives us per-endpoint latency on the tool layer —
  # useful for correlating tool span latency in Langfuse with the actual
  # backend response time here.
  - job_name: mock-services
    static_configs:
      - targets: ["mock-services:9000"]
        labels: { layer: app }

  # ---------------------------------------------------------------------
  #  OpenTelemetry Collector (Phase 2.2 — trace routing hub)
  # ---------------------------------------------------------------------
  # The collector emits its own /metrics on :8888. Series we care about:
  # `otelcol_receiver_accepted_spans`, `otelcol_exporter_sent_spans`,
  # `otelcol_exporter_send_failed_spans`, `otelcol_exporter_queue_size`,
  # `otelcol_processor_batch_batch_send_size`. All carry `service_name`
  # and `exporter` labels so the LLM Overview dashboard can split by
  # destination (we only have one today, but the labels are there).
  - job_name: otel-collector
    static_configs:
      - targets: ["otel-collector:8888"]
        labels: { layer: traces }

  # ---------------------------------------------------------------------
  #  Prometheus itself
  # ---------------------------------------------------------------------
  # Scrape ourselves so we can plot scrape_duration_seconds and target
  # health on the dashboard. Cheap, useful, traditional.
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
        labels: { layer: meta }
